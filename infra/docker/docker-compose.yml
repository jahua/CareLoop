# Big5Loop – DB + N8N + Next.js. One command: docker compose up
# From repo root: docker compose --env-file Big5Loop/.env -f Big5Loop/infra/docker/docker-compose.yml up --build

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-big5loop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-big5loop}
    volumes:
      - big5loop_pgdata:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-big5loop} -d ${POSTGRES_DB:-big5loop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:2.12.0
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: Europe/Zurich
      # API key for programmatic workflow management
      N8N_API_KEY: "big5loop-dev-api-key"
      # Required so Code nodes can read NVIDIA_API_KEY / NVIDIA_MODEL for detector & generator
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # v2: relax file-permission enforcement (Docker volume ownership)
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
      NVIDIA_API_URL: ${NVIDIA_API_URL:-https://integrate.api.nvidia.com/v1/chat/completions}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/gemma-3n-e4b-it}
      MEMORY_RETRIEVAL_TOP_K: ${MEMORY_RETRIEVAL_TOP_K:-5}
      MEMORY_EMBEDDING_MODEL: ${MEMORY_EMBEDDING_MODEL:-BAAI/bge-m3}
    volumes:
      - n8n_data:/home/node/.n8n
      - ../../workflows/n8n:/workflows:ro
    ports:
      - "5678:5678"
    depends_on:
      db:
        condition: service_healthy


  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    command: >
      sh -c "mkdir -p /app/node_modules/@big5loop &&
             ln -sf /app/packages/contracts /app/node_modules/@big5loop/contracts &&
             npx next dev --hostname 0.0.0.0 --turbo"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      N8N_WEBHOOK_URL: http://n8n:5678
      NEXT_PUBLIC_N8N_WEBHOOK_URL: http://localhost:5678
      # Full pipeline: "Big5Loop Phase 5 PANDORA Evaluation v4 (5 detector nodes)" → webhook path below
      N8N_DEFAULT_WORKFLOW_PATH: ${N8N_DEFAULT_WORKFLOW_PATH:-big5loop-eval-v5}
      DATABASE_URL: postgresql://${POSTGRES_USER:-big5loop}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-big5loop}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_API_URL: ${NVIDIA_API_URL:-https://integrate.api.nvidia.com/v1/chat/completions}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/gemma-3n-e4b-it}
      NVIDIA_EMBED_MODEL: ${NVIDIA_EMBED_MODEL:-nvidia/nv-embedqa-e5-v5}
      GATEWAY_SHADOW_LOG: ${GATEWAY_SHADOW_LOG:-/tmp/gateway-shadow.jsonl}
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-/tmp/audit.jsonl}
    volumes:
      - ../../apps/web/src:/app/apps/web/src
    ports:
      - "3000:3000"
    depends_on:
      - n8n

volumes:
  big5loop_pgdata:
  n8n_data:
