# Big5Loop – Nginx reverse proxy for big5loop.boyig.com
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled
# Run: certbot --nginx -d big5loop.boyig.com

upstream big5loop_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name big5loop.boyig.com;

    # Let's Encrypt challenge (certbot will add/modify)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$server_name$request_uri;

    # Temporary: proxy to app before SSL
    location / {
        proxy_pass http://big5loop_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

